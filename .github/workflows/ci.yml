name: CI/CD Pipeline

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.10'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_NO_PYTHON_VERSION_WARNING: '1'
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_RETRIES: '5'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -r requirements-ci.txt

      - name: Linting (Ruff)
        run: ruff check drug_discovery/ scripts/ tests/

      - name: Python compile check
        run: python -m py_compile $(find drug_discovery scripts tests -name '*.py' | tr '\n' ' ')

  test:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -e .
          pip install -r requirements-ci.txt

      - name: Run unit tests
        run: |
          pytest tests/ --ignore=tests/test_scraper_comprehensive.py -v --maxfail=1 --cov=drug_discovery --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -e .
          pip install -r requirements-ci.txt

      - name: Run integration smoke test
        run: |
          python - <<'PY'
          from drug_discovery import DrugDiscoveryPipeline

          pipeline = DrugDiscoveryPipeline(model_type="gnn", device="cpu")
          assert pipeline is not None
          print("integration_smoke_ok=1")
          PY

  scraping-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies and scraping extras
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -e .[scraping]
          pip install -r requirements-ci.txt
          python -m playwright install chromium

      - name: Run scraping integration tests
        run: |
          pytest tests/test_scraper_comprehensive.py -v

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.27.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          timeout: '10m0s'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Ensure SARIF file exists
        if: always()
        run: |
          if [ ! -s trivy-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > trivy-results.sarif
          fi

      - name: Upload Trivy results to GitHub Security
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: warn

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme

      - name: Build documentation
        run: |
          echo "Documentation build placeholder"
