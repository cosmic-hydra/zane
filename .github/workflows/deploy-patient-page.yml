name: Deploy Patient Page

on:
  push:
    branches: [main]
    paths:
      - 'docs/patient/**'
      - '.github/workflows/deploy-patient-page.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site bundle
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const siteDir = path.join(process.cwd(), 'site');
            fs.mkdirSync(siteDir, { recursive: true });

            const sourceHtml = path.join(process.cwd(), 'docs', 'patient', 'index.html');
            const targetHtml = path.join(siteDir, 'index.html');
            fs.copyFileSync(sourceHtml, targetHtml);

            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 1,
              page: 1,
            });

            const latest = data[0];
            const payload = latest
              ? {
                  number: latest.number,
                  title: latest.title,
                  url: latest.html_url,
                  state: latest.state,
                  merged_at: latest.merged_at,
                  updated_at: latest.updated_at,
                  author: latest.user?.login,
                  base: latest.base?.ref,
                  head: latest.head?.ref,
                }
              : {};

            fs.writeFileSync(
              path.join(siteDir, 'latest-pr.json'),
              JSON.stringify(payload, null, 2)
            );

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
